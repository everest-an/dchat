name: Go Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend-go/**'
      - '.github/workflows/backend-go-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend-go/**'
      - '.github/workflows/backend-go-ci.yml'

env:
  GO_VERSION: '1.21'

jobs:
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-go

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend-go/go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          working-directory: backend-go
          version: "latest"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: ./backend-go

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: dchat_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: testpassword
      DB_NAME: dchat_test
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_SECRET: test-jwt-secret-key-at-least-32-chars-long
      SERVER_ENVIRONMENT: test
      LOG_LEVEL: error
      LOG_FORMAT: text

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend-go/go.sum

      - name: Run database migrations
        run: |
          mysql -h 127.0.0.1 -u root -ptestpassword dchat_test < migrations/001_initial.sql || true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage
        run: |
          go tool cover -func=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: backend-go/coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: ./backend-go

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend-go/go.sum

      - name: Build API server
        run: go build -ldflags="-s -w" -o bin/api ./cmd/api/

      - name: Build WebSocket server
        run: go build -ldflags="-s -w" -o bin/websocket ./cmd/websocket/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: |
            backend-go/bin/api
            backend-go/bin/websocket

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: ./backend-go

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend-go/go.sum

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

      - name: Check for hardcoded secrets
        run: |
          # Ensure no hardcoded secrets in Go source files
          if grep -rn --include="*.go" -E "(password|secret|api_key|private_key)\s*[:=]\s*\"[^\"]{8,}\"" . | grep -v "_test.go" | grep -v "example" | grep -v "placeholder"; then
            echo "::error::Potential hardcoded secrets found in Go source files!"
            exit 1
          fi
          echo "No hardcoded secrets detected."
